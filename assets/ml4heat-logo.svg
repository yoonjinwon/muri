<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 220" role="img" aria-label="ML4HEAT logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#071a2f" />
      <stop offset="0.55" stop-color="#06172a" />
      <stop offset="1" stop-color="#051325" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="35%" cy="40%" r="85%">
      <stop offset="0" stop-color="#0e2a4a" stop-opacity="0.55" />
      <stop offset="0.55" stop-color="#071a2f" stop-opacity="0.12" />
      <stop offset="1" stop-color="#051325" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blob" cx="35%" cy="35%" r="75%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.95" />
      <stop offset="0.55" stop-color="#3b82f6" stop-opacity="0.55" />
      <stop offset="1" stop-color="#0b2a5a" stop-opacity="0.9" />
    </radialGradient>
  </defs>

  <rect width="1024" height="220" fill="url(#bg)" />
  <rect width="1024" height="220" fill="url(#bgGlow)" />

  <!-- Icon -->
  <g transform="translate(42 42)">
    <!-- Scalloped blob built from circles -->
    <g fill="url(#blob)">
      <circle cx="72" cy="68" r="56" />
      <circle cx="72" cy="12" r="22" />
      <circle cx="112" cy="26" r="22" />
      <circle cx="132" cy="62" r="22" />
      <circle cx="122" cy="102" r="22" />
      <circle cx="88" cy="126" r="22" />
      <circle cx="54" cy="126" r="22" />
      <circle cx="20" cy="102" r="22" />
      <circle cx="12" cy="62" r="22" />
      <circle cx="28" cy="26" r="22" />
    </g>

    <!-- Circuit strokes -->
    <g stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.95">
      <path d="M34 36 L108 92" />
      <path d="M44 26 L118 82" />
      <path d="M24 46 L98 102" />
      <path d="M54 18 L128 74" />
      <path d="M18 60 L88 114" />
    </g>
    <g fill="none" stroke="#ffffff" stroke-width="6" opacity="0.95">
      <circle cx="34" cy="36" r="7" />
      <circle cx="44" cy="26" r="7" />
      <circle cx="24" cy="46" r="7" />
      <circle cx="54" cy="18" r="7" />
      <circle cx="18" cy="60" r="7" />

      <circle cx="108" cy="92" r="7" />
      <circle cx="118" cy="82" r="7" />
      <circle cx="98" cy="102" r="7" />
      <circle cx="128" cy="74" r="7" />
      <circle cx="88" cy="114" r="7" />
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Roboto, Arial, Helvetica, sans-serif" font-weight="900" font-size="96">
    <text x="240" y="150" fill="#ffffff">M</text>
    <text x="330" y="150" fill="#ffffff">L</text>
    <text x="438" y="150" fill="#ff4d8d">4</text>
    <text x="528" y="150" fill="#ffffff">H</text>
    <text x="630" y="150" fill="#ffffff">E</text>
    <text x="732" y="150" fill="#ffffff">A</text>
    <text x="834" y="150" fill="#ffffff">T</text>
  </g>
</svg>
